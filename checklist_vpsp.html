  :root {
    --navy: #0f2340;
    --blue: #1a3f72;
    --blue-mid: #2563a8;
    --red: #c8102e;
    --orange: #e85d04;
    --yellow: #f7b731;
    --green: #1e7e34;
    --green-light: #d4f0dc;
    --border: #b8c7d8;
    --bg: #f0f4f9;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-muted: #5a6a7e;
    --radius: 6px;
    --shadow: 0 2px 8px rgba(15,35,64,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--navy);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .app-header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .app-header .subtitle { font-size: 10px; opacity: 0.6; font-family: 'IBM Plex Mono', monospace; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-header {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.22);
    padding: 7px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .btn-header:hover { background: rgba(255,255,255,0.22); }

  /* ── PROGRESS ── */
  .progress-bar { height: 4px; background: var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-mid), var(--green)); transition: width 0.4s; width: 0%; }

  /* ── STATS BAR ── */
  .stats-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .stat-ok   { background: var(--green); }
  .stat-nok  { background: var(--red); }
  .stat-all  { background: var(--navy); }
  .stat-val  { font-weight: 700; color: var(--navy); }

  /* ── CONTENT ── */
  .content { max-width: 900px; margin: 0 auto; padding: 14px 12px; }

  /* ── INFO CARD ── */
  .info-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .info-header {
    background: var(--navy);
    color: white;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-body { padding: 12px 14px; }
  .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .form-row:last-child { margin-bottom: 0; }
  .field { display: flex; flex-direction: column; gap: 3px; flex: 1 1 150px; }
  .field.full { flex: 1 1 100%; }
  .field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .field input, .field textarea {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    background: white;
    width: 100%;
  }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.13);
  }

  /* ── SECTION CARD ── */
  .section-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .section-header {
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }
  .section-header:hover { filter: brightness(1.08); }
  .section-header .s-left { display: flex; align-items: center; gap: 8px; }
  .section-progress {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .section-toggle { font-size: 14px; transition: transform 0.2s; }
  .section-toggle.open { transform: rotate(180deg); }

  .section-body { padding: 6px 8px 8px; display: block; }
  .section-body.collapsed { display: none; }

  /* ── CHECK ITEMS ── */
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
    border: 1.5px solid transparent;
    margin-bottom: 3px;
  }
  .check-item:hover { background: #f0f4f9; border-color: var(--border); }
  .check-item.checked { background: var(--green-light); border-color: #86efac; }
  .check-item.na { background: #f5f5f5; border-color: #ddd; opacity: 0.6; }

  .check-box {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    color: white;
    transition: all 0.12s;
    background: white;
  }
  .check-item.checked .check-box { background: var(--green); border-color: var(--green); }
  .check-item.checked .check-box::after { content: '✓'; }

  .item-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: #e8eef5;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    min-width: 42px;
    text-align: center;
  }
  .item-label { flex: 1; font-size: 13px; }
  .item-qty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    background: #dbeafe;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .item-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-opt  { background: #e0e7ff; color: #3730a3; }
  .badge-rec  { background: #fef3c7; color: #92400e; }
  .badge-obl  { background: #fee2e2; color: #991b1b; }

  /* ── SECTION COLORS ── */
  .col-navy   { background: var(--navy); }
  .col-blue   { background: var(--blue-mid); }
  .col-red    { background: var(--red); }
  .col-orange { background: var(--orange); }
  .col-green  { background: var(--green); }
  .col-teal   { background: #0f766e; }
  .col-violet { background: #6d28d9; }
  .col-slate  { background: #475569; }

  /* ── COMMENTAIRES ── */
  .obs-field {
    margin: 4px 8px 6px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    width: calc(100% - 16px);
    resize: vertical;
    min-height: 40px;
    color: var(--text-muted);
  }
  .obs-field:focus { outline: none; border-color: var(--blue-mid); }

  @media (max-width: 580px) {
    .app-header h1 { font-size: 13px; }
    .btn-header span { display: none; }
    .item-qty, .item-badge { display: none; }
  }

  @media print {
    body { background: white; font-size: 11px; }
    .app-header, .progress-bar, .stats-bar { display: none !important; }
    .content { padding: 0; max-width: 100%; }
    .section-card, .info-card { box-shadow: none; border: 1px solid #ccc; margin-bottom: 6px; page-break-inside: avoid; }
    .section-body.collapsed { display: block !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>

</div>

// RENDU DES SECTIONS
// ══════════════════════════════════════════════════════════
const container = document.getElementById('sectionsContainer');

sections.forEach(sec => {
  const card = document.createElement('div');
  card.className = 'section-card';
  card.id = sec.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'section-header ' + sec.color;
  hdr.innerHTML = `
    <div class="s-left">
      <span>${sec.icon}</span>
      <span>${sec.title}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="section-progress" id="prog_${sec.id}">0 / ${sec.items.length}</span>
      <span class="section-toggle open" id="tog_${sec.id}">▲</span>
    </div>
  `;
  hdr.addEventListener('click', () => toggleSection(sec.id));
  card.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'section-body';
  body.id = 'body_' + sec.id;

  sec.items.forEach((item, idx) => {
    const itemId = sec.id + '_' + idx;
    const row = document.createElement('div');
    row.className = 'check-item';
    row.id = 'item_' + itemId;
    row.setAttribute('data-section', sec.id);

    const badgeMap = { opt: 'Optionnel', rec: 'Recommandé', obl: 'Obligatoire' };
    const badgeHtml = item.badge
      ? `<span class="item-badge badge-${item.badge}">${badgeMap[item.badge]}</span>`
      : '';
    const qtyHtml = item.qty
      ? `<span class="item-qty">${item.qty}</span>`
      : '';
    const codeHtml = item.code
      ? `<span class="item-code">${item.code}</span>`
      : '<span class="item-code" style="opacity:0;">—</span>';

    row.innerHTML = `
      <div class="check-box"></div>
      ${codeHtml}
      <span class="item-label">${item.label}</span>
      ${qtyHtml}
      ${badgeHtml}
    `;
    row.addEventListener('click', () => toggleItem(itemId, sec.id, sec.items.length));
    body.appendChild(row);
  });

  // Zone observations de section
  const obsArea = document.createElement('textarea');
  obsArea.className = 'obs-field';
  obsArea.placeholder = 'Observations pour cette section…';
  obsArea.id = 'obs_' + sec.id;
  obsArea.addEventListener('input', updateProgress);
  body.appendChild(obsArea);

  card.appendChild(body);
  container.appendChild(card);
});

// ══════════════════════════════════════════════════════════
// TOGGLE SECTION
// ══════════════════════════════════════════════════════════
function toggleSection(id) {
  const body = document.getElementById('body_' + id);
  const tog  = document.getElementById('tog_' + id);
  body.classList.toggle('collapsed');
  tog.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════
// TOGGLE ITEM
// ══════════════════════════════════════════════════════════
function toggleItem(itemId, secId, total) {
  const el = document.getElementById('item_' + itemId);
  el.classList.toggle('checked');
  updateSectionProgress(secId, total);
  updateProgress();
}

function updateSectionProgress(secId, total) {
  const checked = document.querySelectorAll('#body_' + secId + ' .check-item.checked').length;
  const progEl  = document.getElementById('prog_' + secId);
  if (progEl) progEl.textContent = checked + ' / ' + total;
}

// ══════════════════════════════════════════════════════════
// PROGRESS GLOBAL
// ══════════════════════════════════════════════════════════
function updateProgress() {
  const all     = document.querySelectorAll('.check-item').length;
  const checked = document.querySelectorAll('.check-item.checked').length;
  const pct     = all > 0 ? Math.round((checked / all) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statOk').textContent  = checked;
  document.getElementById('statNok').textContent = all - checked;
  document.getElementById('statAll').textContent = all;
  document.getElementById('statPct').textContent = pct + '%';
}

// ══════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════
function resetForm() {
  if (!confirm('Réinitialiser toute la check-list ?')) return;
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('checked'));
  document.querySelectorAll('input, textarea').forEach(el => el.value = '');
  document.getElementById('date_ctrl').value = new Date().toISOString().split('T')[0];
  sections.forEach(sec => updateSectionProgress(sec.id, sec.items.length));
  updateProgress();
}

document.getElementById('date_ctrl').value = new Date().toISOString().split('T')[0];

// ══════════════════════════════════════════════════════════
// ENVOI MAIL
// ══════════════════════════════════════════════════════════
function sendByMail() {
  const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };

  const immat      = get('immat') || '—';
  const date_ctrl  = get('date_ctrl') || '—';
  const heure_ctrl = get('heure_ctrl') || '—';
  const controleur = get('controleur') || '—';
  const mission    = get('mission') || '—';
  const obs_gen    = get('obs_gen') || '—';

  const all     = document.querySelectorAll('.check-item').length;
  const checked = document.querySelectorAll('.check-item.checked').length;
  const pct     = all > 0 ? Math.round((checked / all) * 100) : 0;

  const lines = [
    '══════════════════════════════════════════════',
    '   CHECK-LIST VPSP — FFSS G-2010-C-009',
    '   Commission Locale Opérationnelle — SSA13',
    '══════════════════════════════════════════════',
    '',
    '── IDENTIFICATION ────────────────────────────',
    'Immatriculation : ' + immat,
    'Date contrôle   : ' + date_ctrl + ' à ' + heure_ctrl,
    'Contrôleur      : ' + controleur,
    'Mission         : ' + mission,
    '',
    '── RÉSULTAT GLOBAL ───────────────────────────',
    'Cochés   : ' + checked + ' / ' + all + ' (' + pct + '%)',
    'Restants : ' + (all - checked),
    '',
    '── DÉTAIL PAR SECTION ────────────────────────',
  ];

  sections.forEach(sec => {
    const sChecked = document.querySelectorAll('#body_' + sec.id + ' .check-item.checked').length;
    const sTotal   = sec.items.length;
    const obs      = get('obs_' + sec.id);
    lines.push('');
    lines.push(sec.title + ' — ' + sChecked + '/' + sTotal);
    // Items manquants
    sec.items.forEach((item, idx) => {
      const el = document.getElementById('item_' + sec.id + '_' + idx);
      if (el && !el.classList.contains('checked')) {
        lines.push('  ✗ ' + (item.code ? '[' + item.code + '] ' : '') + item.label);
      }
    });
    if (obs) lines.push('  📝 Obs : ' + obs);
  });

  lines.push('');
  lines.push('── OBSERVATIONS GÉNÉRALES ────────────────────');
  lines.push(obs_gen);
  lines.push('');
  lines.push('══════════════════════════════════════════════');
  lines.push('Export FFSS / SSA13 — ' + new Date().toLocaleString('fr-FR'));
  lines.push('══════════════════════════════════════════════');

  const subject = encodeURIComponent('Check-list VPSP — ' + immat + ' — ' + date_ctrl + ' — ' + pct + '%');
  const body    = encodeURIComponent(lines.join('\n'));
  window.location.href = 'mailto:contact@ssa13.org?subject=' + subject + '&body=' + body;
}

// ══════════════════════════════════════════════════════════
// SAUVEGARDE HTML
// ══════════════════════════════════════════════════════════
function saveForm() {
  const btn = document.querySelector('.btn-save');
  const clone = document.documentElement.cloneNode(true);

  // Copier inputs/textareas
  const liveInps  = document.querySelectorAll('input, textarea');
  const cloneInps = clone.querySelectorAll('input, textarea');
  liveInps.forEach((el, i) => { if (cloneInps[i]) cloneInps[i].value = el.value; });

  // Copier classes (checked, collapsed…)
  const liveEls  = document.querySelectorAll('[class]');
  const cloneEls = clone.querySelectorAll('[class]');
  liveEls.forEach((el, i) => { if (cloneEls[i]) cloneEls[i].className = el.className; });

  // Copier styles inline
  const liveStyled  = document.querySelectorAll('[style]');
  const cloneStyled = clone.querySelectorAll('[style]');
  liveStyled.forEach((el, i) => { if (cloneStyled[i]) cloneStyled[i].setAttribute('style', el.getAttribute('style')); });

  const immat     = (document.getElementById('immat')     || {value:''}).value.trim() || 'VPSP';
  const date_ctrl = (document.getElementById('date_ctrl') || {value:''}).value || '';
  const filename  = 'ChecklistVPSP_' + immat.replace(/\s/g,'_') + '_' + date_ctrl + '.html';

  const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ <span>Enregistré !</span>';
    btn.style.background = '#059669';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#7c3aed'; }, 2200);
  }
}

// ══════════════════════════════════════════════════════════
// SAUVEGARDE PDF (toutes sections dépliées, scroll-capture)
// ══════════════════════════════════════════════════════════
async function savePDF() {
  const btn = document.querySelector('.btn-pdf');
  if (btn) { btn.innerHTML = '⏳ <span>Génération…</span>'; btn.disabled = true; }

  const immat     = (document.getElementById('immat')     || {value:''}).value.trim() || 'VPSP';
  const date_ctrl = (document.getElementById('date_ctrl') || {value:''}).value || '';
  const filename  = 'ChecklistVPSP_' + immat.replace(/\s/g,'_') + '_' + date_ctrl + '.pdf';

  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert('Les librairies PDF ne sont pas encore chargées. Vérifiez votre connexion internet.');
    if (btn) { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }
    return;
  }

  try {
    const { jsPDF } = window.jspdf;

    // Déplier toutes les sections pour la capture
    const collapsed = document.querySelectorAll('.section-body.collapsed');
    collapsed.forEach(el => el.classList.remove('collapsed'));

    // Masquer chrome
    const header    = document.querySelector('.app-header');
    const progBar   = document.querySelector('.progress-bar');
    const statsBar  = document.querySelector('.stats-bar');
    [header, progBar, statsBar].forEach(e => { if(e) e.style.display = 'none'; });

    await new Promise(r => setTimeout(r, 400));

    const content  = document.getElementById('mainContent');
    const pageW    = 210;
    const pageH    = 297;
    const margin   = 6;
    const usableW  = pageW - margin * 2;
    const usableH  = pageH - margin * 2 - 9;

    const canvas = await html2canvas(content, {
      scale: 1.8,
      useCORS: true,
      backgroundColor: '#f0f4f9',
      windowWidth: 900,
      logging: false,
      scrollY: 0
    });

    const imgData  = canvas.toDataURL('image/jpeg', 0.88);
    const ratio    = usableW / canvas.width;
    const totalH   = canvas.height * ratio;
    const slicePx  = usableH / ratio;

    const all     = document.querySelectorAll('.check-item').length;
    const checked = document.querySelectorAll('.check-item.checked').length;
    const pct     = all > 0 ? Math.round((checked / all) * 100) : 0;

    const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    let srcY   = 0;
    let page   = 1;

    while (srcY < canvas.height) {
      if (page > 1) pdf.addPage();

      // En-tête
      pdf.setFillColor(15, 35, 64);
      pdf.rect(0, 0, pageW, margin + 6, 'F');
      pdf.setFontSize(8);
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.text('CHECK-LIST VPSP — FFSS G-2010-C-009 — ' + immat, margin, margin + 1.5);
      pdf.text(date_ctrl + '  |  ' + checked + '/' + all + ' (' + pct + '%)', pageW - margin - 55, margin + 1.5);
      pdf.setTextColor(0, 0, 0);
      pdf.setFont('helvetica', 'normal');

      // Tranche d'image
      pdf.addImage(imgData, 'JPEG', margin, margin + 8 - (srcY * ratio), usableW, totalH);

      // Masques
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, margin + 8 + usableH, pageW, pageH, 'F'); // bas
      pdf.rect(0, 0, pageW, margin + 8, 'F');                // haut

      // Re-en-tête
      pdf.setFillColor(15, 35, 64);
      pdf.rect(0, 0, pageW, margin + 6, 'F');
      pdf.setFontSize(8);
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.text('CHECK-LIST VPSP — FFSS G-2010-C-009 — ' + immat, margin, margin + 1.5);
      pdf.text(date_ctrl + '  |  ' + checked + '/' + all + ' (' + pct + '%)', pageW - margin - 55, margin + 1.5);

      // Pied
      pdf.setFontSize(7);
      pdf.setTextColor(150);
      pdf.text('Page ' + page + '  —  Commission Locale Opérationnelle SSA13  —  ' + new Date().toLocaleDateString('fr-FR'), pageW / 2, pageH - 2, { align: 'center' });
      pdf.setTextColor(0);

      srcY += slicePx;
      page++;
    }

    // Restaurer
    [header, progBar, statsBar].forEach(e => { if(e) e.style.display = ''; });
    collapsed.forEach(el => el.classList.add('collapsed'));

    pdf.save(filename);

    if (btn) {
      btn.innerHTML = '✅ <span>PDF ok !</span>';
      btn.style.background = '#059669';
      setTimeout(() => { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }, 2500);
    }

  } catch(err) {
    console.error('Erreur PDF:', err);
    try {
      [document.querySelector('.app-header'), document.querySelector('.progress-bar'), document.querySelector('.stats-bar')]
        .forEach(e => { if(e) e.style.display = ''; });
    } catch(e2) {}
    alert('Erreur lors de la génération PDF.\nUtilisez Imprimer → "Enregistrer en PDF" comme alternative.');
    if (btn) { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }
  }
}
