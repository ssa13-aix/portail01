<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail SSA13</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0b1a2e;color:#f0f4f8;min-height:100vh;}
#login{position:fixed;inset:0;background:#07111f;display:flex;align-items:center;justify-content:center;z-index:99;}
#login.cache{display:none;}
.box{width:300px;background:#112240;border:1px solid rgba(240,165,0,.3);border-radius:16px;padding:36px 28px;text-align:center;}
.titre{font-size:16px;font-weight:bold;text-transform:uppercase;margin-bottom:4px;}
.sous{font-size:12px;color:#8a9ab0;margin-bottom:20px;}
.plbl{font-size:11px;color:#f0a500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.dots{display:flex;justify-content:center;gap:14px;margin-bottom:20px;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #1a3358;background:transparent;}
.dot.on{background:#f0a500;border-color:#f0a500;}
.dot.ko{background:#e74c3c;border-color:#e74c3c;}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto 12px;}
.pb{background:#1a3358;border:1px solid rgba(240,165,0,.15);color:white;font-size:22px;font-weight:bold;height:52px;border-radius:10px;cursor:pointer;}
.pb:hover{background:#234070;}
.pb:active{transform:scale(.93);}
.p0{grid-column:2;}
.err{font-size:12px;color:#e74c3c;min-height:18px;margin-top:4px;}
/* DASH */
#dash{display:none;}
.hdr{background:#0c1d30;padding:14px 28px;border-bottom:1px solid rgba(240,165,0,.15);display:flex;align-items:center;justify-content:space-between;}
.hnom{font-size:16px;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;}
.hclk{font-size:20px;font-weight:bold;color:#f0a500;}
.content{padding:28px;}
.titre2{font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:8px;}
.titre2 span{color:#e74c3c;}
.sous2{font-size:13px;color:#8a9ab0;margin-bottom:24px;}
.btn-ndps{background:linear-gradient(135deg,#c0392b,#e74c3c);border:none;color:white;font-size:14px;font-weight:bold;text-transform:uppercase;letter-spacing:.05em;padding:11px 22px;border-radius:10px;cursor:pointer;}
#liste{margin-top:20px;}
.dc{background:#112240;border:1px solid rgba(240,165,0,.15);border-left:4px solid #f0a500;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.dc:hover{background:#162c50;}
.dnom{font-size:17px;font-weight:bold;text-transform:uppercase;}
.dmeta{font-size:11px;color:#8a9ab0;margin-top:3px;}
.empty{text-align:center;padding:40px;color:#8a9ab0;font-size:13px;}
.bdeco{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#8a9ab0;font-size:11px;padding:5px 12px;border-radius:7px;cursor:pointer;}
.sdot{width:9px;height:9px;border-radius:50%;background:#f0a500;display:inline-block;animation:pulse 1s infinite;margin-right:8px;}
.sdot.ok{background:#27ae60;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* MODAL */
.mov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;display:none;}
.mov.on{display:flex;}
.mbox{width:min(500px,90vw);background:#0f2040;border:1px solid rgba(240,165,0,.2);border-radius:14px;padding:28px;}
.mtit{font-size:20px;font-weight:bold;text-transform:uppercase;margin-bottom:16px;}
.mgrp{margin-bottom:12px;}
.mlbl{font-size:10px;color:#f0a500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.mi,.ms{width:100%;background:rgba(26,51,88,.5);border:1px solid rgba(240,165,0,.15);color:white;font-size:13px;padding:9px 12px;border-radius:7px;outline:none;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mact{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.mcanc{background:transparent;border:1px solid rgba(255,255,255,.15);color:#8a9ab0;font-size:13px;padding:8px 16px;border-radius:7px;cursor:pointer;}
.mok{background:linear-gradient(135deg,#c0392b,#e74c3c);border:none;color:white;font-size:13px;font-weight:bold;padding:8px 20px;border-radius:7px;cursor:pointer;text-transform:uppercase;}
.ms option{background:#112240;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <div class="titre">Secouristes du Pays d'Aix</div>
    <div class="sous">Portail SSA13 &mdash; Acces securise</div>
    <div class="plbl">Code PIN</div>
    <div class="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="pad">
      <button class="pb" onclick="pp(1)">1</button>
      <button class="pb" onclick="pp(2)">2</button>
      <button class="pb" onclick="pp(3)">3</button>
      <button class="pb" onclick="pp(4)">4</button>
      <button class="pb" onclick="pp(5)">5</button>
      <button class="pb" onclick="pp(6)">6</button>
      <button class="pb" onclick="pp(7)">7</button>
      <button class="pb" onclick="pp(8)">8</button>
      <button class="pb" onclick="pp(9)">9</button>
      <button class="pb p0" onclick="pp(0)">0</button>
      <button class="pb" onclick="pd()">&#9003;</button>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="hdr">
    <div>
      <span class="sdot" id="sdot"></span>
      <span class="hnom">SSA13 &middot; Portail Operationnel</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="hclk" id="hclk">--:--:--</span>
      <button class="bdeco" onclick="deco()">Deconnexion</button>
    </div>
  </div>
  <div class="content">
    <div class="titre2">Gestion des <span>DPS</span></div>
    <div class="sous2">Donnees synchronisees en temps reel sur tous vos appareils</div>
    <button class="btn-ndps" onclick="ouvM()">+ Nouveau DPS</button>
    <div id="liste"><div class="empty">Connexion Firebase...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="mov" id="modal" onclick="if(event.target===this)fermM()">
  <div class="mbox">
    <div class="mtit">Nouveau DPS</div>
    <div class="mgrp"><label class="mlbl">Nom de l'evenement *</label><input class="mi" id="fn" type="text" placeholder="ex: Trail Chateau Gombert"></div>
    <div class="mrow">
      <div class="mgrp"><label class="mlbl">Date *</label><input class="mi" id="fd" type="date"></div>
      <div class="mgrp"><label class="mlbl">Heure</label><input class="mi" id="fh" type="time" value="08:00"></div>
    </div>
    <div class="mgrp"><label class="mlbl">Lieu</label><input class="mi" id="fl" type="text" placeholder="ex: Marseille"></div>
    <div class="mrow">
      <div class="mgrp"><label class="mlbl">Type</label>
        <select class="ms" id="ft">
          <option value="Sportif">Sportif</option>
          <option value="Culturel">Culturel</option>
          <option value="Festif">Festif</option>
          <option value="Scolaire">Scolaire</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="mgrp"><label class="mlbl">Statut</label>
        <select class="ms" id="fs">
          <option value="planifie">Planifie</option>
          <option value="en_cours">En cours</option>
          <option value="termine">Termine</option>
        </select>
      </div>
    </div>
    <div class="mact">
      <button class="mcanc" onclick="fermM()">Annuler</button>
      <button class="mok" onclick="creer()">Creer</button>
    </div>
  </div>
</div>

<script>
var PIN = '1313';
var buf = '';
var db  = null;
var dpsList = [];

/* ─── PIN ─────────────────────────────────── */
function pp(n) {
  if (buf.length >= 4) return;
  buf += String(n);
  majDots();
  if (buf.length === 4) setTimeout(verif, 150);
}

function pd() {
  buf = buf.slice(0, -1);
  majDots();
  document.getElementById('err').textContent = '';
}

function majDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'dot' + (i < buf.length ? ' on' : '');
  }
}

function verif() {
  if (buf === PIN) {
    localStorage.setItem('ssa13_ok', '1');
    show();
  } else {
    document.getElementById('err').textContent = 'Code incorrect';
    for (var i = 0; i < 4; i++) {
      document.getElementById('d' + i).className = 'dot ko';
    }
    setTimeout(function() {
      buf = '';
      majDots();
      document.getElementById('err').textContent = '';
    }, 900);
  }
}

document.addEventListener('keydown', function(e) {
  if (document.getElementById('login').className === 'cache') return;
  if (e.key >= '0' && e.key <= '9') pp(parseInt(e.key));
  if (e.key === 'Backspace') pd();
});

/* ─── DASHBOARD ───────────────────────────── */
function show() {
  document.getElementById('login').className = 'cache';
  document.getElementById('dash').style.display = 'block';
  clock();
  initFB();
}

function deco() {
  localStorage.removeItem('ssa13_ok');
  localStorage.removeItem('ssa13_auth');
  location.reload();
}

function clock() {
  var J = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  function t() {
    var d = new Date();
    document.getElementById('hclk').textContent =
      ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
  }
  t(); setInterval(t, 1000);
}

/* ─── FIREBASE ────────────────────────────── */
function initFB() {
  try {
    var app;
    try { app = firebase.app(); } catch(e) {
      app = firebase.initializeApp({
        apiKey: "AIzaSyBUgtRjARF11rr9KmRsf691cLCYFE5vEns",
        authDomain: "plateforme-157b5.firebaseapp.com",
        projectId: "plateforme-157b5",
        storageBucket: "plateforme-157b5.firebasestorage.app",
        messagingSenderId: "531261518626",
        appId: "1:531261518626:web:4f317fa3b21dcbc71fab7b"
      });
    }
    db = firebase.firestore();
    db.enablePersistence().catch(function() {});
    startListener();
  } catch(e) {
    setSdot('err');
    document.getElementById('liste').innerHTML = '<div class="empty">Erreur Firebase: ' + e.message + '</div>';
  }
}

function setSdot(s) {
  var d = document.getElementById('sdot');
  if (d) d.className = 'sdot ' + (s === 'ok' ? 'ok' : '');
}

function startListener() {
  db.collection('dps').orderBy('createdAt', 'desc').onSnapshot(function(snap) {
    setSdot('ok');
    dpsList = [];
    snap.forEach(function(doc) { dpsList.push(doc.data()); });
    renderListe();
  }, function(err) {
    document.getElementById('liste').innerHTML = '<div class="empty">Erreur: ' + err.message + '</div>';
  });
}

function renderListe() {
  var el = document.getElementById('liste');
  var actifs = dpsList.filter(function(d) { return d.statut !== 'termine'; });
  if (!actifs.length) {
    el.innerHTML = '<div class="empty">Aucun DPS actif. Cliquez sur + Nouveau DPS.</div>';
    return;
  }
  var h = '';
  for (var i = 0; i < actifs.length; i++) {
    var d = actifs[i];
    var nom = (d.nom || '').replace(/[<>&]/g, '');
    var dt = '';
    try { if (d.date) dt = new Date(d.date+'T12:00:00').toLocaleDateString('fr-FR'); } catch(e) {}
    h += '<div class="dc" onclick="aller(\'' + d.id + '\')">'
       + '<div class="dnom">' + nom + '</div>'
       + '<div class="dmeta">' + dt + (d.heure ? ' | ' + d.heure : '') + (d.lieu ? ' | ' + d.lieu : '') + ' | ' + (d.statut || '') + '</div>'
       + '</div>';
  }
  el.innerHTML = h;
}

function aller(id) { window.location.href = 'dossier.html?id=' + id; }

/* ─── MODAL ───────────────────────────────── */
function ouvM() {
  document.getElementById('fn').value = '';
  document.getElementById('fd').value = new Date().toISOString().split('T')[0];
  document.getElementById('fl').value = '';
  document.getElementById('modal').className = 'mov on';
}
function fermM() { document.getElementById('modal').className = 'mov'; }

function creer() {
  var nom = document.getElementById('fn').value.trim();
  var dat = document.getElementById('fd').value;
  if (!nom || !dat) { alert('Nom et date obligatoires.'); return; }
  var d = new Date();
  var id = 'DPS-' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2) + '-' + ('00'+(dpsList.length+1)).slice(-3);
  var dps = {
    id: id, nom: nom, date: dat,
    heure: document.getElementById('fh').value,
    lieu:  document.getElementById('fl').value.trim(),
    type:  document.getElementById('ft').value,
    statut: document.getElementById('fs').value,
    createdAt: Date.now()
  };
  if (!db) { alert('Firebase non connecte.'); return; }
  db.collection('dps').doc(id).set(dps).then(function() {
    fermM();
    window.location.href = 'dossier.html?id=' + id;
  }).catch(function(e) { alert('Erreur: ' + e.message); });
}

/* ─── DEMARRAGE ───────────────────────────── */
window.addEventListener('DOMContentLoaded', function() {
  var ok    = localStorage.getItem('ssa13_ok') === '1' || localStorage.getItem('ssa13_auth') === 'true';
  var urlOk = new URLSearchParams(location.search).get('auth') === '1';
  if (ok || urlOk) {
    localStorage.setItem('ssa13_ok', '1');
    show();
    if (urlOk) history.replaceState(null, '', location.pathname);
  }
});

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && localStorage.getItem('ssa13_ok') === '1') renderListe();
});
</script>
</body>
</html>
