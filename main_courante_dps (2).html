<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Main Courante DPS — Secouristes du Pays d'Aix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0f2340;
    --blue: #1a3f72;
    --blue-mid: #2563a8;
    --red: #c8102e;
    --orange: #e85d04;
    --yellow: #f7b731;
    --green: #1e7e34;
    --border: #b8c7d8;
    --bg: #f0f4f9;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-muted: #5a6a7e;
    --radius: 6px;
    --shadow: 0 2px 8px rgba(15,35,64,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--navy);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .app-header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .app-header .subtitle { font-size: 11px; opacity: 0.65; font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-header {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 13px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-header:hover { background: rgba(255,255,255,0.22); }

  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-mid), var(--yellow)); transition: width 0.5s; width: 0%; }

  /* ── CONTENT ── */
  .content { max-width: 960px; margin: 0 auto; padding: 16px 14px; }

  /* ── CARDS ── */
  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .card-header {
    background: var(--navy);
    color: white;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .card-header.red { background: var(--red); }
  .card-header.blue { background: var(--blue-mid); }
  .card-header.orange { background: var(--orange); }
  .card-body { padding: 12px 14px; }

  /* ── FORM ── */
  .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.flex1 { flex: 1 1 120px; }
  .field.flex2 { flex: 2 1 200px; }
  .field.flex3 { flex: 3 1 260px; }
  .field.full  { flex: 1 1 100%; }

  label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
  }

  input[type="text"],
  input[type="time"],
  input[type="date"],
  input[type="number"],
  textarea, select {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text);
    background: white;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.15);
  }
  textarea { resize: vertical; }

  .btn-now {
    background: var(--blue-mid); color: white; border: none;
    border-radius: 3px; padding: 4px 8px; font-size: 10px;
    cursor: pointer; font-weight: 700; white-space: nowrap;
  }
  .btn-now:hover { background: var(--blue); }
  .input-with-btn { display: flex; gap: 5px; align-items: stretch; }
  .input-with-btn input { flex: 1; }

  /* ── LOG TABLE ── */
  .log-table-wrap { overflow-x: auto; }
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .log-table th {
    background: var(--navy);
    color: white;
    padding: 9px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    text-align: left;
    white-space: nowrap;
  }
  .log-table td {
    padding: 4px 6px;
    border-bottom: 1px solid #e8eef5;
    vertical-align: middle;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: #f5f8ff; }

  .log-num {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    color: var(--navy);
    font-size: 13px;
    text-align: center;
    min-width: 36px;
  }
  .log-time {
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 5px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    width: 90px;
    text-align: center;
  }
  .log-time:focus { outline: none; border-color: var(--blue-mid); }
  .log-event {
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    min-width: 300px;
  }
  .log-event:focus { outline: none; border-color: var(--blue-mid); }

  .btn-now-sm {
    background: var(--blue-mid); color: white; border: none;
    border-radius: 3px; padding: 4px 7px; font-size: 10px;
    cursor: pointer; font-weight: 700; white-space: nowrap;
    line-height: 1;
  }
  .btn-now-sm:hover { background: var(--blue); }

  .btn-add-row, .btn-del-row {
    border: none; border-radius: 4px; padding: 5px 9px;
    font-size: 13px; cursor: pointer; font-weight: 700;
    transition: all 0.15s; line-height: 1;
  }
  .btn-add-row { background: var(--green); color: white; }
  .btn-add-row:hover { background: #155d27; }
  .btn-del-row { background: #fee2e2; color: var(--red); }
  .btn-del-row:hover { background: var(--red); color: white; }

  .log-actions { display: flex; align-items: center; gap: 16px; padding: 10px 14px; background: #f8fafc; border-top: 1px solid var(--border); }
  .row-count { font-size: 12px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }

  /* ── PAGE COUNTER ── */
  .page-counter {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
  }
  .page-counter label { font-size: 12px; color: var(--text-muted); font-weight: 700; }
  .counter-group { display: flex; align-items: center; gap: 6px; }
  .counter-btn {
    width: 30px; height: 30px;
    border: 2px solid var(--border); border-radius: 4px;
    background: white; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .counter-btn:hover { background: #e8eef5; border-color: var(--blue-mid); }
  .counter-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px; font-weight: 700;
    min-width: 32px; text-align: center; color: var(--navy);
  }
  .page-sep { color: var(--text-muted); font-size: 16px; font-weight: 700; }

  @media (max-width: 600px) {
    .app-header h1 { font-size: 14px; }
    .btn-header span { display: none; }
    .log-time { width: 75px; }
  }

  @media print {
    body { background: white; font-size: 11px; }
    .app-header, .progress-bar, .log-actions, .status-bar { display: none !important; }
    .content { padding: 0; max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ccc; margin-bottom: 8px; page-break-inside: avoid; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap; gap: 6px;
  }
  .status-bar.draft   { background: #fef3c7; border-bottom: 1px solid #f59e0b; color: #92400e; }
  .status-bar.locked  { background: #fee2e2; border-bottom: 2px solid var(--red); color: #7f1d1d; }
  .status-bar.restored{ background: #d1fae5; border-bottom: 1px solid #10b981; color: #064e3b; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; flex-shrink:0; }
  .dot-draft   { background: #f59e0b; }
  .dot-locked  { background: var(--red); animation: blink 1.5s infinite; }
  .dot-ok      { background: #10b981; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-time { opacity: 0.7; font-size: 11px; }

  /* ── LOCKED STATE ── */
  body.is-locked input,
  body.is-locked textarea,
  body.is-locked select {
    pointer-events: none;
    background: #f5f5f5 !important;
    color: #666 !important;
    border-color: #ddd !important;
  }
  body.is-locked .btn-add-row,
  body.is-locked .btn-del-row,
  body.is-locked .btn-now,
  body.is-locked .btn-now-sm,
  body.is-locked .counter-btn,
  body.is-locked .btn-header.btn-save,
  body.is-locked .btn-header.btn-reset-doc {
    pointer-events: none;
    opacity: 0.35;
  }
  body.is-locked .log-actions { display: none; }

</style>
</head>
<body data-locked="false">

<header class="app-header">
  <div>
    <h1>📋 Main Courante — DPS</h1>
    <div class="subtitle">Secouristes du Pays d'Aix — FFSS / SSA13</div>
  </div>
  <div class="header-actions">
    <button class="btn-header" onclick="window.print()" style="background:#1a3f72;border-color:transparent;">🖨️ <span>Imprimer</span></button>
    <button class="btn-header" onclick="sendByMail()" style="background:#1e7e34;border-color:transparent;">📧 <span>Envoyer</span></button>
    <button class="btn-header btn-save" onclick="saveForm()" style="background:#7c3aed;border-color:transparent;">💾 <span>HTML</span></button>
    <button class="btn-header btn-pdf" onclick="savePDF()" style="background:#dc2626;border-color:transparent;">📄 <span>PDF</span></button>
    <button class="btn-header btn-reset-doc" onclick="resetForm()" style="background:rgba(200,16,46,0.5);">↺ <span>Réinitialiser</span></button>
  </div>
</header>

<div id="statusBar" class="status-bar draft">
  <span><span class="status-dot dot-draft"></span><strong id="statusMsg">Brouillon en cours — données sauvegardées automatiquement dans ce navigateur</strong></span>
  <span class="status-time" id="statusTime"></span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="content" id="mainContent">

  <!-- EN-TÊTE DPS -->
  <div class="card">
    <div class="card-header blue">📋 Identification du DPS</div>
    <div class="card-body">
      <div class="form-row">
        <div class="field flex3">
          <label>Événement</label>
          <input type="text" id="evenement" placeholder="Nom de l'événement…" />
        </div>
        <div class="field flex2">
          <label>N° CENTAURE</label>
          <input type="text" id="centaure" placeholder="Numéro Centaure…" />
        </div>
      </div>
      <div class="form-row">
        <div class="field full">
          <label>Adresse / Lieu</label>
          <input type="text" id="adresse" placeholder="Adresse complète du DPS…" />
        </div>
      </div>
      <div class="form-row">
        <div class="field flex1">
          <label>Date</label>
          <input type="date" id="date_dps" />
        </div>
        <div class="field flex1">
          <label>Horaire début</label>
          <div class="input-with-btn">
            <input type="time" id="horaire_debut" />
            <button class="btn-now" onclick="setNow('horaire_debut')">Maint.</button>
          </div>
        </div>
        <div class="field flex1">
          <label>Horaire fin</label>
          <div class="input-with-btn">
            <input type="time" id="horaire_fin" />
            <button class="btn-now" onclick="setNow('horaire_fin')">Maint.</button>
          </div>
        </div>
        <div class="field flex2">
          <label>Heure d'appel SAMU (déclaration)</label>
          <div class="input-with-btn">
            <input type="time" id="heure_samu" />
            <button class="btn-now" onclick="setNow('heure_samu')">Maint.</button>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="field flex2">
          <label>Heure d'arrivée sur place</label>
          <div class="input-with-btn">
            <input type="time" id="heure_arrivee" />
            <button class="btn-now" onclick="setNow('heure_arrivee')">Maint.</button>
          </div>
        </div>
        <div class="field flex2">
          <label>Dispo. en place et OPS à</label>
          <div class="input-with-btn">
            <input type="time" id="heure_ops" />
            <button class="btn-now" onclick="setNow('heure_ops')">Maint.</button>
          </div>
        </div>
        <div class="field flex1">
          <label>Nbr d'IS</label>
          <input type="number" id="nbr_is" min="0" placeholder="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="field flex3">
          <label>Chef de dispo / Chef de poste</label>
          <input type="text" id="chef_poste" placeholder="NOM Prénom" style="text-transform:uppercase;" />
        </div>
      </div>
    </div>
  </div>

  <!-- ORGANISATION -->
  <div class="card">
    <div class="card-header">🗂️ Organisation</div>
    <div class="card-body">
      <textarea id="organisation" rows="5" placeholder="Décrire l'organisation du DPS : répartition des équipes, postes, véhicules, secteurs couverts…"></textarea>
    </div>
  </div>

  <!-- MAIN COURANTE — TABLEAU -->
  <div class="card">
    <div class="card-header red">📝 Main Courante — Événements</div>
    <div class="log-table-wrap">
      <table class="log-table" id="logTable">
        <thead>
          <tr>
            <th style="width:48px; text-align:center;">N°</th>
            <th style="width:130px;">Horaire</th>
            <th>Événements</th>
          </tr>
        </thead>
        <tbody id="logBody">
        </tbody>
      </table>
    </div>
    <div class="log-actions">
      <button class="btn-add-row" onclick="addRow()">＋ Ajouter une ligne</button>
      <span class="row-count" id="rowCount">0 ligne(s)</span>
    </div>
  </div>

  <!-- PAGINATION -->
  <div class="card">
    <div class="card-header">📄 Pagination</div>
    <div class="card-body">
      <div class="page-counter">
        <label>Page</label>
        <div class="counter-group">
          <button class="counter-btn" onclick="changePageNum(-1)">−</button>
          <div class="counter-val" id="pageNum">1</div>
        </div>
        <span class="page-sep">/</span>
        <div class="counter-group">
          <button class="counter-btn" onclick="changePageTotal(-1)">−</button>
          <div class="counter-val" id="pageTotal">1</div>
          <button class="counter-btn" onclick="changePageTotal(1)">+</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- end content -->

<script>
// ══════════════════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════════════════
const STORAGE_KEY = 'main_courante_dps_autosave';
let pageNum = 1, pageTotal = 1, rowCount = 0;
let autoSaveTimer = null;
const IS_LOCKED = document.body.getAttribute('data-locked') === 'true';

// ══════════════════════════════════════════════════════════
//  INIT — au chargement de la page
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {

  if (IS_LOCKED) {
    // ── Fichier verrouillé (sauvegardé définitivement) ──
    applyLockedUI();
  } else {
    // ── Mode brouillon : essayer de restaurer depuis localStorage ──
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        restoreFromData(data);
        showStatus('restored', '↩️ Brouillon restauré — dernière sauvegarde : ' + data.savedAt);
      } catch(e) {
        initFresh();
        showStatus('draft', '✏️ Brouillon en cours — sauvegarde automatique active');
      }
    } else {
      initFresh();
      showStatus('draft', '✏️ Nouveau document — sauvegarde automatique active');
    }

    // Auto-save à chaque modification
    document.addEventListener('input', () => {
      scheduleAutoSave();
      updateProgress();
    });
  }

  updateProgress();
});

// ══════════════════════════════════════════════════════════
//  INIT VIERGE
// ══════════════════════════════════════════════════════════
function initFresh() {
  document.getElementById('date_dps').value = new Date().toISOString().split('T')[0];
  for (let i = 0; i < 12; i++) addRow();
}

// ══════════════════════════════════════════════════════════
//  VERROUILLAGE UI
// ══════════════════════════════════════════════════════════
function applyLockedUI() {
  document.body.classList.add('is-locked');
  showStatus('locked', '🔒 Document VERROUILLÉ — enregistrement définitif effectué. Lecture seule.');
}

// ══════════════════════════════════════════════════════════
//  STATUS BAR
// ══════════════════════════════════════════════════════════
function showStatus(type, msg) {
  const bar  = document.getElementById('statusBar');
  const msgEl = document.getElementById('statusMsg');
  const timeEl = document.getElementById('statusTime');
  if (!bar) return;
  bar.className = 'status-bar ' + type;
  const dotClass = type === 'locked' ? 'dot-locked' : type === 'restored' ? 'dot-ok' : 'dot-draft';
  msgEl.innerHTML = '<span class="status-dot ' + dotClass + '"></span>' + msg;
  timeEl.textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

// ══════════════════════════════════════════════════════════
//  AUTO-SAVE (localStorage)
// ══════════════════════════════════════════════════════════
function scheduleAutoSave() {
  if (IS_LOCKED) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(autoSave, 800); // délai 800ms après dernière frappe
}

function autoSave() {
  if (IS_LOCKED) return;
  try {
    const data = collectAllData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const now = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    showStatus('draft', '💾 Sauvegarde auto — ' + now + ' (données conservées dans ce navigateur)');
  } catch(e) {
    console.warn('Auto-save failed:', e);
  }
}

// ══════════════════════════════════════════════════════════
//  COLLECTE DE TOUTES LES DONNÉES
// ══════════════════════════════════════════════════════════
function collectAllData() {
  // Champs principaux
  const fields = {};
  document.querySelectorAll('input[id], textarea[id], select[id]').forEach(el => {
    fields[el.id] = el.value;
  });

  // Lignes de la main courante
  const logRows = [];
  document.querySelectorAll('#logBody tr').forEach(tr => {
    const timeEl  = tr.querySelector('.log-time');
    const eventEl = tr.querySelector('.log-event');
    logRows.push({
      time:  timeEl  ? timeEl.value  : '',
      event: eventEl ? eventEl.value : ''
    });
  });

  return {
    fields,
    logRows,
    pageNum,
    pageTotal,
    savedAt: new Date().toLocaleString('fr-FR')
  };
}

// ══════════════════════════════════════════════════════════
//  RESTAURATION DEPUIS LES DONNÉES
// ══════════════════════════════════════════════════════════
function restoreFromData(data) {
  // Restaurer les champs
  if (data.fields) {
    Object.entries(data.fields).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.value = val;
    });
  }

  // Restaurer les lignes de la main courante
  const tbody = document.getElementById('logBody');
  tbody.innerHTML = '';
  rowCount = 0;

  const rows = data.logRows && data.logRows.length > 0 ? data.logRows : Array(12).fill({time:'', event:''});
  rows.forEach(row => {
    addRow(row.time, row.event);
  });

  // Pagination
  if (data.pageNum)   { pageNum   = data.pageNum;   document.getElementById('pageNum').textContent   = pageNum; }
  if (data.pageTotal) { pageTotal = data.pageTotal; document.getElementById('pageTotal').textContent = pageTotal; }
}

// ══════════════════════════════════════════════════════════
//  SETTIME
// ══════════════════════════════════════════════════════════
function setNow(id) {
  const now = new Date();
  document.getElementById(id).value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  scheduleAutoSave();
}

// ══════════════════════════════════════════════════════════
//  PAGINATION
// ══════════════════════════════════════════════════════════
function changePageNum(d) {
  if (IS_LOCKED) return;
  pageNum = Math.max(1, pageNum + d);
  document.getElementById('pageNum').textContent = pageNum;
  scheduleAutoSave();
}
function changePageTotal(d) {
  if (IS_LOCKED) return;
  pageTotal = Math.max(1, pageTotal + d);
  document.getElementById('pageTotal').textContent = pageTotal;
  scheduleAutoSave();
}

// ══════════════════════════════════════════════════════════
//  LIGNES DE LA MAIN COURANTE
// ══════════════════════════════════════════════════════════
function addRow(timeVal, eventVal) {
  if (IS_LOCKED) return;
  rowCount++;
  const tbody = document.getElementById('logBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="log-num">${rowCount}</td>
    <td>
      <div style="display:flex;gap:4px;align-items:center;">
        <input class="log-time" type="time" placeholder="—" value="${timeVal || ''}" oninput="scheduleAutoSave()" />
        <button class="btn-now-sm" onclick="setRowTime(this)">⏱</button>
      </div>
    </td>
    <td>
      <input class="log-event" type="text" placeholder="Décrire l'événement…" value="${(eventVal || '').replace(/"/g,'&quot;')}" oninput="scheduleAutoSave(); updateProgress();" />
    </td>
    <td style="padding:4px 6px;">
      <button class="btn-del-row" onclick="delRow(this)" title="Supprimer">✕</button>
    </td>
  `;
  tbody.appendChild(tr);
  document.getElementById('rowCount').textContent = rowCount + ' ligne(s)';
  updateProgress();
}

function delRow(btn) {
  if (IS_LOCKED) return;
  const tr = btn.closest('tr');
  tr.remove();
  const rows = document.querySelectorAll('#logBody tr');
  rowCount = rows.length;
  rows.forEach((r, i) => {
    const numCell = r.querySelector('.log-num');
    if (numCell) numCell.textContent = i + 1;
  });
  document.getElementById('rowCount').textContent = rowCount + ' ligne(s)';
  scheduleAutoSave();
  updateProgress();
}

function setRowTime(btn) {
  if (IS_LOCKED) return;
  const input = btn.previousElementSibling;
  const now = new Date();
  input.value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  scheduleAutoSave();
}

// ══════════════════════════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════════════════════════
function updateProgress() {
  const inputs = document.querySelectorAll('input[type="text"], input[type="time"], input[type="date"], textarea');
  let filled = 0;
  inputs.forEach(i => { if (i.value.trim()) filled++; });
  const pct = Math.min(100, Math.round((filled / Math.max(inputs.length, 1)) * 100));
  document.getElementById('progress').style.width = pct + '%';
}

// ══════════════════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════════════════
function resetForm() {
  if (IS_LOCKED) return;
  if (!confirm('Effacer toute la main courante ET supprimer la sauvegarde automatique ?\nCette action est irréversible.')) return;
  document.querySelectorAll('input[type="text"], input[type="time"], textarea').forEach(i => i.value = '');
  document.getElementById('date_dps').value = new Date().toISOString().split('T')[0];
  document.getElementById('nbr_is').value = '';
  document.getElementById('logBody').innerHTML = '';
  rowCount = 0;
  pageNum = 1; pageTotal = 1;
  document.getElementById('pageNum').textContent = '1';
  document.getElementById('pageTotal').textContent = '1';
  document.getElementById('rowCount').textContent = '0 ligne(s)';
  for (let i = 0; i < 12; i++) addRow();
  localStorage.removeItem(STORAGE_KEY);
  showStatus('draft', '✏️ Nouveau document — sauvegarde automatique active');
  updateProgress();
}

    'N° CENTAURE   : ' + centaure,
    'Date          : ' + date_dps,
    'Horaire       : ' + hdebut + ' → ' + hfin,
    'Appel SAMU    : ' + hSamu,
    'Arrivee place : ' + hArrivee,
    'OPS à         : ' + hOps,

// ══════════════════════════════════════════════════════════
//  SAUVEGARDE HTML (avec verrouillage définitif)
// ══════════════════════════════════════════════════════════
function saveForm() {
  const btn = document.querySelector('.btn-save');

  if (!confirm('⚠️ Enregistrer le document ?\n\nUne fois enregistré, le fichier HTML sera en LECTURE SEULE et ne pourra plus être modifié.\n\nLa sauvegarde automatique dans ce navigateur sera également effacée.\n\nContinuer ?')) return;

  const clone     = document.documentElement.cloneNode(true);

  // Copier les valeurs
  const liveInps  = document.querySelectorAll('input, textarea, select');
  const cloneInps = clone.querySelectorAll('input, textarea, select');
  liveInps.forEach((el, i) => {
    const c = cloneInps[i];
    if (!c) return;
    if (el.type === 'checkbox' || el.type === 'radio') c.checked = el.checked;
    else c.value = el.value;
  });

  // Copier les classes
  const liveEls  = document.querySelectorAll('[class]');
  const cloneEls = clone.querySelectorAll('[class]');
  liveEls.forEach((el, i) => { if (cloneEls[i]) cloneEls[i].className = el.className; });

  // Copier styles inline
  const liveStyled  = document.querySelectorAll('[style]');
  const cloneStyled = clone.querySelectorAll('[style]');
  liveStyled.forEach((el, i) => { if (cloneStyled[i]) cloneStyled[i].setAttribute('style', el.getAttribute('style')); });

  // Copier le tbody dynamique
  const liveTbody  = document.getElementById('logBody');
  const cloneTbody = clone.querySelector('#logBody');
  if (liveTbody && cloneTbody) cloneTbody.innerHTML = liveTbody.innerHTML;

  // Copier pagination
  ['pageNum','pageTotal','rowCount'].forEach(id => {
    const live = document.getElementById(id);
    const cl   = clone.querySelector('#' + id);
    if (live && cl) cl.textContent = live.textContent;
  });

  // ⚠️ VERROUILLAGE : marquer data-locked="true" dans le clone
  clone.querySelector('body').setAttribute('data-locked', 'true');

  // Horodatage de verrouillage dans la status bar du clone
  const cloneStatus = clone.querySelector('#statusMsg');
  if (cloneStatus) {
    cloneStatus.innerHTML = '🔒 Document VERROUILLÉ — enregistré le ' + new Date().toLocaleString('fr-FR') + ' — Lecture seule';
  }
  const cloneBar = clone.querySelector('#statusBar');
  if (cloneBar) cloneBar.className = 'status-bar locked';

  // Nom du fichier
  const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const evenement = get('evenement') || 'DPS';
  const date_dps  = get('date_dps')  || '';
  const filename  = 'MainCourante_' + evenement.replace(/\s+/g,'_').toUpperCase() + '_' + date_dps + '.html';

  // Téléchargement
  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

  // Effacer la sauvegarde auto maintenant que c'est enregistré
  localStorage.removeItem(STORAGE_KEY);

  // Feedback
  if (btn) {
    btn.innerHTML = '✅ <span>Enregistré !</span>';
    btn.style.background = '#059669';
    setTimeout(() => { btn.innerHTML = '💾 <span>HTML</span>'; btn.style.background = '#7c3aed'; }, 3000);
  }
  showStatus('draft', '✅ Fichier téléchargé et verrouillé. Ce brouillon reste modifiable ici.');
}

// ══════════════════════════════════════════════════════════
//  SAUVEGARDE PDF
// ══════════════════════════════════════════════════════════
async function savePDF() {
  const btn = document.querySelector('.btn-pdf');
  if (btn) { btn.innerHTML = '⏳ <span>Génération…</span>'; btn.disabled = true; }

  const evenement = get('evenement') || 'DPS';
  const date_dps  = get('date_dps')  || '';
  const filename  = 'MainCourante_' + evenement.replace(/\s+/g,'_').toUpperCase() + '_' + date_dps + '.pdf';

  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert('Les librairies PDF ne sont pas encore chargées. Vérifiez votre connexion internet et réessayez.');
    if (btn) { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }
    return;
  }

  try {
    const { jsPDF } = window.jspdf;
    const content = document.getElementById('mainContent');
    const header  = document.querySelector('.app-header');
    const prog    = document.querySelector('.progress-bar');
    const statBar = document.querySelector('.status-bar');

    [header, prog, statBar].forEach(e => { if(e) e.style.display = 'none'; });
    await new Promise(r => setTimeout(r, 300));

    const pdf    = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW  = 210, pageH = 297, margin = 6;
    const usableW = pageW - margin * 2;
    const usableH = pageH - margin * 2 - 8;

    const canvas = await html2canvas(content, {
      scale: 2, useCORS: true, backgroundColor: '#f0f4f9',
      windowWidth: 960, logging: false
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const ratio   = usableW / canvas.width;
    const totalH  = canvas.height * ratio;
    const slicePx = usableH / ratio;
    let srcY = 0, page = 1;

    while (srcY < canvas.height) {
      if (page > 1) pdf.addPage();
      pdf.setFillColor(15, 35, 64);
      pdf.rect(0, 0, pageW, margin + 5, 'F');
      pdf.setFontSize(8); pdf.setTextColor(255,255,255); pdf.setFont('helvetica','bold');
      pdf.text('MAIN COURANTE DPS — FFSS Secouristes du Pays d\'Aix', margin, margin + 2);
      pdf.text(evenement + (date_dps ? '  |  ' + date_dps : ''), pageW - margin - 70, margin + 2);
      pdf.setTextColor(0,0,0); pdf.setFont('helvetica','normal');

      pdf.addImage(imgData, 'JPEG', margin, margin + 7 - (srcY * ratio), usableW, totalH);

      pdf.setFillColor(255,255,255);
      pdf.rect(0, margin + 7 + usableH, pageW, pageH, 'F');
      pdf.rect(0, 0, pageW, margin + 7, 'F');

      pdf.setFillColor(15,35,64);
      pdf.rect(0, 0, pageW, margin + 5, 'F');
      pdf.setFontSize(8); pdf.setTextColor(255,255,255); pdf.setFont('helvetica','bold');
      pdf.text('MAIN COURANTE DPS — FFSS Secouristes du Pays d\'Aix', margin, margin + 2);
      const lbl = evenement + (date_dps ? '  |  ' + date_dps : '');
      if (lbl.length < 40) pdf.text(lbl, pageW - margin - 60, margin + 2);

      pdf.setFontSize(7); pdf.setTextColor(150); pdf.setFont('helvetica','normal');
      pdf.text('Page ' + page + ' / ' + pageNum + '  —  Export : ' + new Date().toLocaleDateString('fr-FR'), pageW / 2, pageH - 2, { align: 'center' });
      pdf.setTextColor(0);

      srcY += slicePx;
      page++;
    }

    [header, prog, statBar].forEach(e => { if(e) e.style.display = ''; });
    pdf.save(filename);

    if (btn) {
      btn.innerHTML = '✅ <span>PDF ok !</span>';
      btn.style.background = '#059669';
      setTimeout(() => { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }, 2500);
    }

  } catch(err) {
    console.error('Erreur PDF:', err);
    try { [document.querySelector('.app-header'), document.querySelector('.progress-bar'), document.querySelector('.status-bar')].forEach(e => { if(e) e.style.display = ''; }); } catch(e2) {}
    alert('Erreur lors de la génération PDF.\nUtilisez le bouton Imprimer → "Enregistrer en PDF" comme alternative.');
    if (btn) { btn.innerHTML = '📄 <span>PDF</span>'; btn.style.background = '#dc2626'; btn.disabled = false; }
  }
}

  // ── Collecte complete du formulaire ──
  function collectForm(){
    var data={inputs:{},checkItems:[],urgItems:[],tableChecks:[],tableInputs:[],tableSelects:[],triage:null,pain:null,sexe:null};
    document.querySelectorAll('input[id],select[id],textarea[id]').forEach(function(el){

      data.urgItems[i]=el.classList.contains('checked');

    if(!db){ loadFromLS(); return; }
    db.collection(FB_COLLECTION).doc(FB_DOC_ID).get().then(function(doc){
      if(doc.exists&&doc.data()&&doc.data().data){
        try{
          restoreForm(JSON.parse(doc.data().data));
          setSaveStatus('\u2601\ufe0f Donnees restaurees depuis le cloud');
        }catch(e){ loadFromLS(); }
      } else {
        // Pas de donnees cloud, essayer localStorage
        loadFromLS();
        // Si c'est un nouveau bilan, pre-remplir depuis metadonnees
        if(IS_BILAN&&!localStorage.getItem(STORE_KEY)){
          preFillBilan();
        }
      }
    }).catch(function(){ loadFromLS(); });
  }

  function loadFromLS(){
    if(!STORE_KEY) return;
    var saved=localStorage.getItem(STORE_KEY);
    if(saved){ try{ restoreForm(JSON.parse(saved)); setSaveStatus('\uD83D\uDCBE Donnees locales restaurees'); }catch(e){} }
    else if(IS_BILAN) preFillBilan();
  }

  function preFillBilan(){
    // Pre-remplir depuis les metadonnees du bilan dans Firestore
    if(!db||!bilan_id) return;
    db.collection('dps').doc(dps_id).collection('bilans').doc(bilan_id).get().then(function(doc){
      if(!doc.exists) return;
      var b=doc.data();
      var elH=document.getElementById('heure_pec'); if(elH&&b.heure) elH.value=b.heure;
      var elL=document.getElementById('lieu');      if(elL&&b.lieu)  elL.value=b.lieu;
      var elC=document.getElementById('circonstance'); if(elC&&b.motif) elC.value=b.motif;
      if(b.sexe==='Homme'&&typeof selectSexe==='function') selectSexe('M');
      if(b.sexe==='Femme'&&typeof selectSexe==='function') selectSexe('F');
    });
  }

  setSaveStatus('Connexion...');
})();
</script>
</body>
</html>
