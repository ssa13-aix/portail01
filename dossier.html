<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossier DPS — SSA13</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#0b1a2e;color:#f0f4f8;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 70% 20%,rgba(192,57,43,.08) 0%,transparent 60%),linear-gradient(160deg,#0b1a2e 0%,#0e1e35 50%,#111e33 100%);pointer-events:none;}
.page{position:relative;z-index:1;min-height:100vh;padding-bottom:60px;}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid rgba(240,165,0,.15);background:rgba(11,26,46,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;gap:16px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:14px;}
.btn-back{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#8a9ab0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-back:hover{background:rgba(255,255,255,.1);color:#f0f4f8;}
.header-id{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#8a9ab0;letter-spacing:.08em;}
.statut-select{background:transparent;border:1px solid rgba(255,255,255,.12);color:#f0f4f8;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:8px;cursor:pointer;outline:none;}
.statut-select option{background:#112240;color:#f0f4f8;}
.statut-select.planifie{border-color:rgba(240,165,0,.4);color:#f0a500;}
.statut-select.en_cours{border-color:rgba(39,174,96,.4);color:#2ecc71;}
.statut-select.termine{border-color:rgba(138,154,176,.3);color:#8a9ab0;}
.dps-hero{padding:36px 40px 28px;border-bottom:1px solid rgba(240,165,0,.15);}
.dps-hero-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
.dps-type-badge{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(255,255,255,.06);border:1px solid rgba(240,165,0,.15);flex-shrink:0;}
.dps-nom{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,4vw,40px);font-weight:800;text-transform:uppercase;letter-spacing:.03em;line-height:1.05;margin-bottom:10px;}
.dps-meta{display:flex;flex-wrap:wrap;gap:16px;}
.dps-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#8a9ab0;}
.dps-meta-item strong{color:#f0f4f8;}
.dps-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;}
.dps-stat{background:rgba(17,34,64,.85);border:1px solid rgba(240,165,0,.15);border-radius:10px;padding:14px;text-align:center;}
.dps-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;}
.dps-stat-label{font-size:11px;color:#8a9ab0;text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.section-header{padding:28px 40px 14px;display:flex;align-items:center;gap:12px;}
.section-line{flex:1;height:1px;background:linear-gradient(to right,rgba(240,165,0,.15),transparent);}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#8a9ab0;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 40px;}
.tool-card{background:rgba(17,34,64,.85);border:1px solid rgba(240,165,0,.15);border-radius:14px;padding:24px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden;}
.tool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--tc,#e74c3c),transparent);opacity:0;transition:opacity .25s;}
.tool-card:hover{transform:translateY(-4px);border-color:rgba(240,165,0,.3);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.tool-card:hover::before{opacity:1;}
.tool-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;}
.tool-card-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-bottom:6px;}
.tool-card-desc{font-size:13px;color:#8a9ab0;line-height:1.55;margin-bottom:18px;}
.tool-card-footer{display:flex;align-items:center;justify-content:space-between;}
.tool-tag{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:#8a9ab0;}
.tool-arrow{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:13px;color:#8a9ab0;transition:all .2s;}
.tool-card:hover .tool-arrow{background:#c0392b;border-color:#c0392b;color:white;}
.c-green{--tc:#27ae60;background:rgba(39,174,96,.12);}
.c-blue{--tc:#2980b9;background:rgba(52,152,219,.12);}
.bilans-header{display:flex;align-items:center;justify-content:space-between;padding:28px 40px 14px;flex-wrap:wrap;gap:10px;}
.bilans-title{display:flex;align-items:center;gap:12px;}
.btn-new-bilan{display:flex;align-items:center;gap:8px;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#e74c3c;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;border-radius:8px;cursor:pointer;}
.bilans-list{display:flex;flex-direction:column;gap:10px;padding:0 40px;}
.bilan-item{background:rgba(17,34,64,.85);border:1px solid rgba(240,165,0,.15);border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
.bilan-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:#e74c3c;min-width:40px;text-align:center;}
.bilan-body{flex:1;min-width:0;}
.bilan-victime{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;}
.bilan-meta{font-size:12px;color:#8a9ab0;margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;}
.bilan-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.bilan-issue-select{background:rgba(26,51,88,.6);border:1px solid rgba(255,255,255,.1);color:#f0f4f8;font-family:'Barlow',sans-serif;font-size:11px;padding:5px 8px;border-radius:6px;cursor:pointer;outline:none;}
.bilan-issue-select option{background:#112240;}
.btn-open-bilan{display:inline-flex;align-items:center;gap:4px;background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.35);color:#f0f4f8;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;padding:6px 14px;border-radius:7px;text-decoration:none;white-space:nowrap;}
.bilans-empty{text-align:center;padding:40px;color:#8a9ab0;}
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px;gap:16px;}
.not-found-icon{font-size:64px;opacity:.3;}
.not-found-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;}
.footer{text-align:center;padding:40px;font-size:12px;color:#8a9ab0;border-top:1px solid rgba(240,165,0,.1);margin-top:40px;}
.footer strong{color:#e74c3c;}
.mov{position:fixed;inset:0;z-index:200;background:rgba(7,17,31,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.mov.on{opacity:1;pointer-events:all;}
.modal{width:min(480px,92vw);background:linear-gradient(160deg,#0f2040,#0c1a30);border:1px solid rgba(240,165,0,.2);border-radius:16px;padding:32px;transform:translateY(20px);transition:.3s;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.mov.on .modal{transform:translateY(0);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#8a9ab0;margin-bottom:24px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#f0a500;}
.form-input,.form-select{background:rgba(26,51,88,.5);border:1px solid rgba(240,165,0,.15);color:#f0f4f8;font-family:'Barlow',sans-serif;font-size:14px;padding:10px 14px;border-radius:8px;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus,.form-select:focus{border-color:rgba(240,165,0,.5);}
.form-select option{background:#112240;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);color:#8a9ab0;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:10px 18px;border-radius:8px;cursor:pointer;}
.btn-ok{background:linear-gradient(135deg,#c0392b,#e74c3c);border:none;color:white;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;padding:10px 22px;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;}
@media(max-width:640px){
  .header,.dps-hero{padding-left:16px;padding-right:16px;}
  .dps-stats{grid-template-columns:repeat(2,1fr);}
  .section-header,.tools-grid,.bilans-list,.bilans-header{padding-left:16px;padding-right:16px;}
  .bilan-actions{flex-direction:column;}.form-row{grid-template-columns:1fr;}.modal{padding:20px 16px;}
}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="header-left">
      <a class="btn-back" href="index.html?auth=1">&larr; Portail</a>
      <span class="header-id" id="header-id">&mdash;</span>
    </div>
    <select class="statut-select" id="statut-select" onchange="updateStatut()">
      <option value="planifie">Planifie</option>
      <option value="en_cours">En cours</option>
      <option value="termine">Termine</option>
    </select>
  </header>
  <div id="main-content"><div style="text-align:center;padding:60px;color:#8a9ab0;">&#128260; Chargement du dossier...</div></div>
</div>

<div class="mov" id="modal-bilan" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Nouvelle Fiche Bilan</div>
    <div class="modal-sub">Informations de la victime</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Heure prise en charge</label><input class="form-input" id="b-heure" type="time"></div>
      <div class="form-group"><label class="form-label">Sexe</label>
        <select class="form-select" id="b-sexe"><option value="">-</option><option value="Homme">Homme</option><option value="Femme">Femme</option><option value="Enfant">Enfant</option></select>
      </div>
    </div>
    <div class="form-row full"><div class="form-group">
      <label class="form-label">Motif / Plainte</label>
      <input class="form-input" id="b-motif" type="text" placeholder="ex : Chute, malaise...">
    </div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="b-lieu" type="text" placeholder="ex : Km 12..."></div>
      <div class="form-group"><label class="form-label">Issue</label>
        <select class="form-select" id="b-issue">
          <option value="En cours">En cours</option><option value="Laisse sur place">Laisse sur place</option>
          <option value="Evacue SAMU">Evacue SAMU</option><option value="Evacue pompiers">Evacue pompiers</option><option value="Refus de soins">Refus de soins</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalBilan()">Annuler</button>
      <button class="btn-ok" onclick="createBilan()">Ouvrir la fiche</button>
    </div>
  </div>
</div>

<script>
// ═══ FIREBASE ═══
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBUgtRjARF11rr9KmRsf691cLCYFE5vEns",
  authDomain: "plateforme-157b5.firebaseapp.com",
  projectId: "plateforme-157b5",
  storageBucket: "plateforme-157b5.firebasestorage.app",
  messagingSenderId: "531261518626",
  appId: "1:531261518626:web:4f317fa3b21dcbc71fab7b"
};
var app, db;
try{ app=firebase.app(); }catch(e){ app=firebase.initializeApp(FIREBASE_CONFIG); }
db = firebase.firestore();
db.enablePersistence().catch(function(e){ console.log('Persistence:',e.code); });

var params  = new URLSearchParams(location.search);
var DPS_ID  = params.get('id');
var currentDPS = null;
var bilanListener = null;

var ICONS = {Sportif:'&#127939;',Culturel:'&#127917;',Festif:'&#127881;',Scolaire:'&#127979;',Autre:'&#128204;'};

// ═══ INIT ═══
function render(){
  if(!DPS_ID){ showNotFound(); return; }
  db.collection('dps').doc(DPS_ID).get().then(function(doc){
    if(!doc.exists){ showNotFound(); return; }
    currentDPS = doc.data();
    renderHero();
    startBilanListener();
  }).catch(function(e){ showNotFound(); });
}

function showNotFound(){
  document.getElementById('main-content').innerHTML='<div class="not-found"><div class="not-found-icon">&#128193;</div><div class="not-found-title">DPS introuvable</div><a href="index.html?auth=1" style="color:#f0a500;">Retour au portail</a></div>';
}

function renderHero(){
  var dps = currentDPS;
  document.title = dps.nom+' - SSA13';
  document.getElementById('header-id').textContent = dps.id;
  var sel=document.getElementById('statut-select');
  sel.value=dps.statut||'planifie';
  sel.className='statut-select '+(dps.statut||'planifie');
  var dt='';
  try{ if(dps.date) dt=new Date(dps.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}); }catch(e){}
  var icon=ICONS[dps.type]||'&#128204;';
  var nom=(dps.nom||'').replace(/[<>&]/g,'');
  var meta='<div class="dps-meta-item">&#128197; <strong>'+dt+'</strong></div>';
  if(dps.heure) meta+='<div class="dps-meta-item">&#128336; <strong>'+dps.heure+'</strong></div>';
  if(dps.lieu)  meta+='<div class="dps-meta-item">&#128205; <strong>'+(dps.lieu||'')+'</strong></div>';
  if(dps.type)  meta+='<div class="dps-meta-item">&#127991; <strong>'+(dps.type||'')+'</strong></div>';

  document.getElementById('main-content').innerHTML=''
    +'<div class="dps-hero">'
      +'<div class="dps-hero-top"><div class="dps-type-badge">'+icon+'</div>'
        +'<div><div class="dps-nom">'+nom+'</div><div class="dps-meta">'+meta+'</div></div>'
      +'</div>'
      +'<div class="dps-stats">'
        +'<div class="dps-stat"><div class="dps-stat-num" id="s-bil" style="color:#e74c3c">-</div><div class="dps-stat-label">Fiches Bilan</div></div>'
        +'<div class="dps-stat"><div class="dps-stat-num" id="s-lsp" style="color:#27ae60">-</div><div class="dps-stat-label">Liberes</div></div>'
        +'<div class="dps-stat"><div class="dps-stat-num" id="s-eva" style="color:#f0a500">-</div><div class="dps-stat-label">Evacues</div></div>'
        +'<div class="dps-stat"><div class="dps-stat-num" id="s-ec"  style="color:#8a9ab0">-</div><div class="dps-stat-label">En cours</div></div>'
      +'</div>'
    +'</div>'
    +'<div class="section-header"><div class="section-label">Documents</div><div class="section-line"></div></div>'
    +'<div class="tools-grid">'
      +'<a class="tool-card c-green" href="fiche_recap_dps.html?dps_id='+DPS_ID+'" target="_blank">'
        +'<div class="tool-icon c-green">&#128202;</div><div class="tool-card-title">Fiche Recapitulatif</div>'
        +'<div class="tool-card-desc">Synthese du dispositif : moyens, interventions et bilan.</div>'
        +'<div class="tool-card-footer"><span class="tool-tag">Document principal</span><div class="tool-arrow">&rarr;</div></div>'
      +'</a>'
      +'<a class="tool-card c-blue" href="main_courante_dps%20(2).html?dps_id='+DPS_ID+'" target="_blank">'
        +'<div class="tool-icon c-blue">&#128203;</div><div class="tool-card-title">Main Courante</div>'
        +'<div class="tool-card-desc">Suivi chronologique avec autosave.</div>'
        +'<div class="tool-card-footer"><span class="tool-tag">Temps reel</span><div class="tool-arrow">&rarr;</div></div>'
      +'</a>'
    +'</div>'
    +'<div class="bilans-header">'
      +'<div class="bilans-title"><div class="section-label">Fiches Bilan</div></div>'
      +'<button class="btn-new-bilan" onclick="openModalBilan()">+ Nouvelle fiche bilan</button>'
    +'</div>'
    +'<div class="bilans-list" id="bilans-list"><div class="bilans-empty">Chargement...</div></div>'
    +'<footer class="footer"><strong>SSA13</strong> &middot; '+nom+' &middot; '+dps.id+'</footer>';
}

// ═══ BILANS TEMPS REEL ═══
function startBilanListener(){
  if(bilanListener) bilanListener();
  bilanListener = db.collection('dps').doc(DPS_ID).collection('bilans')
    .orderBy('createdAt','asc')
    .onSnapshot(function(snap){
      var bilans=[];
      snap.forEach(function(doc){ bilans.push(doc.data()); });
      renderBilans(bilans);
      refreshStats(bilans);
    });
}

function issueCol(issue){
  if(!issue||issue==='En cours') return '#f0a500';
  if(issue.indexOf('place')>-1) return '#27ae60';
  if(issue.indexOf('vac')>-1) return '#e74c3c';
  return '#8a9ab0';
}

function renderBilans(bilans){
  var el=document.getElementById('bilans-list');
  if(!el) return;
  if(!bilans.length){
    el.innerHTML='<div class="bilans-empty">Aucune fiche bilan. Cliquez sur "+ Nouvelle fiche bilan".</div>';
    return;
  }
  var html='';
  for(var i=0;i<bilans.length;i++){
    var b=bilans[i];
    var num='#'+(i+1<10?'0':'')+(i+1);
    var vic=(b.sexe?b.sexe+' - ':'')+(b.motif||'Victime');
    var issue=b.issue||'En cours';
    var col=issueCol(issue);
    var opts=[['En cours','En cours'],['Laisse sur place','Laisse sur place'],['Evacue SAMU','Evacue SAMU'],['Evacue pompiers','Evacue pompiers'],['Refus de soins','Refus de soins']];
    var sel='';
    for(var j=0;j<opts.length;j++) sel+='<option value="'+opts[j][0]+'"'+(issue===opts[j][0]?' selected':'')+'>'+opts[j][1]+'</option>';
    var meta='';
    if(b.heure) meta+='<span>&#128336; '+b.heure+'</span>';
    if(b.lieu)  meta+='<span>&#128205; '+b.lieu+'</span>';
    meta+='<span style="color:'+col+'">'+issue+'</span>';
    html+='<div class="bilan-item">'
      +'<div class="bilan-num">'+num+'</div>'
      +'<div class="bilan-body"><div class="bilan-victime">'+vic+'</div><div class="bilan-meta">'+meta+'</div></div>'
      +'<div class="bilan-actions">'
      +'<select class="bilan-issue-select" onchange="updIssue(\''+b.id+'\',this.value)">'+sel+'</select>'
      +'<a class="btn-open-bilan" href="fiche_bilan_interactive%20(3).html?dps_id='+DPS_ID+'&bilan_id='+b.id+'" target="_blank">Ouvrir</a>'
      +'</div></div>';
  }
  el.innerHTML=html;
}

function updIssue(bilanId, val){
  db.collection('dps').doc(DPS_ID).collection('bilans').doc(bilanId).update({issue:val});
}

function refreshStats(bilans){
  var s1=document.getElementById('s-bil'); if(s1) s1.textContent=bilans.length;
  var nbL=bilans.filter(function(b){ return b.issue&&b.issue.indexOf('place')>-1; }).length;
  var nbV=bilans.filter(function(b){ return b.issue&&b.issue.indexOf('vac')>-1; }).length;
  var nbE=bilans.filter(function(b){ return !b.issue||b.issue==='En cours'; }).length;
  var s2=document.getElementById('s-lsp'); if(s2) s2.textContent=nbL;
  var s3=document.getElementById('s-eva'); if(s3) s3.textContent=nbV;
  var s4=document.getElementById('s-ec');  if(s4) s4.textContent=nbE;
}

// ═══ STATUT DPS ═══
function updateStatut(){
  var val=document.getElementById('statut-select').value;
  document.getElementById('statut-select').className='statut-select '+val;
  db.collection('dps').doc(DPS_ID).update({statut:val});
}

// ═══ MODAL BILAN ═══
function openModalBilan(){
  var n=new Date();
  document.getElementById('b-heure').value=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);
  document.getElementById('b-motif').value='';document.getElementById('b-lieu').value='';
  document.getElementById('b-sexe').value='';document.getElementById('b-issue').value='En cours';
  document.getElementById('modal-bilan').className='mov on';
}
function closeModalBilan(){ document.getElementById('modal-bilan').className='mov'; }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-bilan')) closeModalBilan(); }

function createBilan(){
  var bilan={
    id:'BIL-'+Date.now(),
    dps_id:DPS_ID,
    heure:document.getElementById('b-heure').value,
    sexe:document.getElementById('b-sexe').value,
    motif:document.getElementById('b-motif').value.trim(),
    lieu:document.getElementById('b-lieu').value.trim(),
    issue:document.getElementById('b-issue').value,
    createdAt:Date.now()
  };
  db.collection('dps').doc(DPS_ID).collection('bilans').doc(bilan.id).set(bilan).then(function(){
    closeModalBilan();
    window.open('fiche_bilan_interactive%20(3).html?dps_id='+DPS_ID+'&bilan_id='+bilan.id,'_blank');
  });
}

// ═══ START ═══
render();
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible' && currentDPS) startBilanListener();
});
</script>
</body>
